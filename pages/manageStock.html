<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Stock - NexStock</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-icon align-center" style="font-size: 2rem; margin-bottom:0;">📦</div>
            <h2 class="text-gradient align-center" style="font-size: 1.5rem;">NexStock</h2>
            
            <ul class="nav-links">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="addProduct.html">➕ Add Product</a></li>
                <li><a href="manageStock.html" class="active">📦 Manage Stock</a></li>
                <li style="margin-top: auto;"><a href="#" id="logoutBtn" style="color: var(--danger-color);">🚪 Logout</a></li>
            </ul>
        </aside>

        <main class="main-content fade-in">
            <header class="top-header">
                <div>
                    <h1>Manage Stock</h1>
                    <p class="text-muted">Update product quantities or remove items.</p>
                </div>
            </header>

            <!-- Stock Movement Form -->
            <div class="glass-panel" style="margin-bottom: 2rem; max-width: 800px;">
                <h3 style="margin-bottom: 1rem;">Stock Movement Request</h3>
                <form id="stockMovementForm" class="form-group" style="flex-direction: row; align-items: flex-end; flex-wrap: wrap;">
                    <div class="input-container" style="flex: 2; min-width: 200px;">
                        <label for="stockProduct">Select Product</label>
                        <select id="stockProduct" required>
                            <option value="">Loading products...</option>
                        </select>
                    </div>
                    
                    <div class="input-container" style="flex: 1; min-width: 120px;">
                        <label for="stockType">Movement Type</label>
                        <select id="stockType" required>
                            <option value="in">Add Stock (IN)</option>
                            <option value="out">Reduce Stock (OUT)</option>
                        </select>
                    </div>

                    <div class="input-container" style="flex: 1; min-width: 100px;">
                        <label for="stockQty">Quantity</label>
                        <input type="number" id="stockQty" min="1" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="height: 48px;">Apply</button>
                </form>
                <div id="stockMsg" class="hide mt-tight"></div>
            </div>

            <div class="glass-panel mt-loose">
                <h3 style="margin-bottom: 1rem;">Full Inventory</h3>
                <div class="table-container">
                    <table id="manageProductsTable">
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Available Qty</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="manageProductsTableBody">
                            <tr><td colspan="4" class="align-center">Loading Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal (Hidden) -->
    <div id="editModal" class="hide" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50;">
        <div class="glass-card fade-in" style="width: 400px; padding: 2rem;">
            <h3>Edit Product</h3>
            <form id="editForm" class="form-group mt-tight">
                <input type="hidden" id="editId">
                <div class="input-container">
                    <label>Name</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="input-container">
                    <label>Price</label>
                    <input type="number" id="editPrice" step="0.01" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn" style="flex: 1; background: rgba(255,255,255,0.1);" onclick="document.getElementById('editModal').classList.add('hide')">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UI.initManageStock();
        });
    </script>
</body>
</html>
