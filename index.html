<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStock - Inventory Management System</title>
    <meta name="description" content="A powerful, modern inventory management system for your growing business.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient flex-center min-h-screen">
    <div class="glass-card login-container fade-in">
        <div class="text-center mb-loose">
            <div class="logo-icon">📦</div>
            <h1 class="text-gradient">NexStock</h1>
            <p class="text-muted">Sign in to manage your inventory</p>
        </div>
        
        <form id="loginForm" class="form-group">
            <div class="input-container">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@example.com" required>
            </div>
            
            <div class="input-container">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <span>Sign In</span>
            </button>
            <div id="loginError" class="error-msg hide mt-tight align-center">Invalid credentials.</div>
        </form>
        
        <div class="text-center mt-loose">
            <p class="text-small text-muted">Don't have an account? <a href="#" id="toggleRegister" class="text-link">Register here</a></p>
        </div>
    </div>

    <!-- Register Form (Hidden by Default) -->
    <div class="glass-card register-container fade-in hide">
        <div class="text-center mb-loose">
            <div class="logo-icon">✨</div>
            <h1 class="text-gradient">Create Account</h1>
            <p class="text-muted">Start managing your business efficiently</p>
        </div>
        
        <form id="registerForm" class="form-group">
            <div class="input-container">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="Type your name here" required>
            </div>

            <div class="input-container">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="admin@example.com" required>
            </div>
            
            <div class="input-container">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <span>Register</span>
            </button>
            <div id="regError" class="error-msg hide mt-tight align-center">Error registering.</div>
        </form>
        
        <div class="text-center mt-loose">
            <p class="text-small text-muted">Already have an account? <a href="#" id="toggleLogin" class="text-link">Sign in</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
